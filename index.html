<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sable</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#F7F2E9">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#14110C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sable">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="wordmark"><span class="wm"><span class="sable-ink">Sable</span><sup class="appver" id="appVer"></sup></span></div>
    <div class="tb-right">
      <div class="pile-count"><b id="pileCount">0</b> en pile</div>
      <button id="settingsBtn" class="theme-btn" aria-label="Réglages" title="Réglages">
        <svg class="ic"><use href="icons.svg#gear"/></svg>
      </button>
    </div>
  </div>

  <div class="capture">
    <button class="cap-icon" id="btnAdd" title="Ajouter photo, fichier ou coller" aria-label="Ajouter une photo, un fichier, ou coller"><svg class="ic"><use href="icons.svg#plus"/></svg></button>
    <input id="captureInput" placeholder="Lien, idée, typo…" autocomplete="off" aria-label="Ajouter à ta pile">
    <button id="captureBtn"><svg class="ic"><use href="icons.svg#plus"/></svg>Garder</button>
  </div>
  <div class="cap-hint" id="capHint" style="display:none">Colle un lien, note une idée, ou ajoute une photo ou un fichier via le bouton +. Les liens arrivent avec un aperçu quand le site le permet.</div>
  <input type="file" id="fPhoto" accept="image/*" capture="environment" hidden>
  <input type="file" id="fFile" accept="image/*,audio/*,video/*" multiple hidden>

  <section id="tab-surface">
    <div id="stage"></div>
  </section>

  <section id="tab-pile" hidden>
    <div class="crumb">
      <button class="back" id="crumbBack" hidden aria-label="Retour aux catégories" title="Retour aux catégories"><svg class="ic"><use href="icons.svg#chevron-left"/></svg></button>
      <div class="path"><span class="cur" id="crumbCur"></span><span class="cnt" id="crumbCnt"></span></div>
      <button class="pill" id="filterBtn" aria-label="Filtrer" title="Filtrer"><svg class="ic"><use href="icons.svg#filter"/></svg>Filtrer</button>
      <button class="pill" id="viewBtn" aria-label="Affichage" title="Affichage"><svg class="ic"><use href="icons.svg#view"/></svg>Affichage</button>
    </div>
    <div class="pilesearch"><svg class="ic"><use href="icons.svg#search"/></svg><input id="pileSearch" placeholder="Rechercher dans cette pile…" autocomplete="off" aria-label="Rechercher dans la pile"></div>
    <div id="pileList"></div>
  </section>

  <section id="tab-categories" hidden>
    <input id="searchInput" class="search" placeholder="Chercher dans toute ta pile…" autocomplete="off">
    <div id="rootResults" hidden></div>
    <div id="rootBrowse">
      <div class="cathead"><span class="lbl">Catégories</span><button class="editbtn" id="catEdit">Éditer</button></div>
      <div class="domgrid" id="domGrid"></div>
      <button class="rowlink" id="openArch"><span>Mis de côté</span><span class="n" id="archN"></span></button>
      <button class="rowlink" id="openTrash"><span>Corbeille</span><span class="n" id="trashN"></span></button>
    </div>
    <input type="file" id="fImport" accept="application/json,.json" hidden>
  </section>

  <nav class="tabs">
    <button data-tab="surface" class="active"><svg class="ic"><use href="icons.svg#surface"/></svg>Surface</button>
    <button data-tab="pile"><svg class="ic"><use href="icons.svg#pile"/></svg>Pile</button>
    <button data-tab="categories"><svg class="ic"><use href="icons.svg#grid"/></svg>Catégories</button>
  </nav>
</div>

<div id="authgate" class="authgate" hidden>
  <div class="authcard">
    <div class="wordmark"><span class="sable-ink">Sable</span></div>
    <p class="authsub">Connecte-toi pour retrouver ta pile sur tous tes appareils.</p>
    <input id="authEmail" class="search" type="email" placeholder="ton@email.com" autocomplete="email" inputmode="email">
    <button id="authBtn" class="authbtn">Recevoir le lien de connexion</button>
    <div id="authMsg" class="authmsg"></div>
  </div>
</div>

<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="appSheet" role="dialog" aria-label="Panneau">
  <div class="grab"></div>
  <h2 id="sheetTitle"></h2>
  <div class="slist" id="sheetList"></div>
</div>

<div id="lightbox" class="lightbox" hidden></div>
<div id="toast"></div>

<script src="./app.js"></script>
<script>
/* =================== CONFIG — À REMPLIR =================== */
const SUPABASE_URL     = "https://jwplfeziaivveodtgczh.supabase.co";
const SUPABASE_ANON_KEY= "sb_publishable_AERyGrp8psPJTn9vxAKMWg_Zl4JljdP";
/* ---- Aperçus des liens ----
   1) META_API : service qui renvoie titre + image d'une page en JSON (compatible
      navigateur / CORS). Par défaut Microlink : sans clé, ~50 requêtes/jour, et il
      lance un vrai navigateur → il lit même les pages rendues en JavaScript.
      Marche pour Reddit, Telegram, Pinterest, Behance, Vimeo, presse/blogs…
      ⚠️ Instagram & X/Twitter : souvent KO en gratuit (mur de connexion / anti-bot).
      Le grain est quand même créé — tu ajoutes titre + aperçu à la main dans la fiche.
   2) IMG_PROXY : fait passer l'image d'aperçu par un cache d'images (wsrv.nl) pour
      contourner les blocages « anti-hotlink » (sinon l'image renvoie une erreur et
      n'apparaît pas). Mets "" pour désactiver.
   3) LINK_PROXY : repli si META_API échoue — proxy qui renvoie le HTML brut, dont on
      lit les balises Open Graph. Optionnel ("" pour aucun repli). allorigins est
      instable ; alternative possible : "https://corsproxy.io/?url=". */
/* ---- Aperçu « maison » (recommandé) ----
   Ta propre Edge Function Supabase récupère l'aperçu côté serveur, comme WhatsApp,
   sans dépendre d'un service tiers ni buter sur le CORS du navigateur.
   → déploie d'abord la fonction (fichier link-preview.ts), PUIS mets ici le NOM
     exact de ta fonction Supabase. Chez toi elle s'appelle "clever-action".
     (Si tu la recrées un jour sous un autre nom, change juste la ligne ci-dessous.)
     C'est essayé EN PREMIER ; repli auto sur les autres. Vide = désactivé. */
const SELF_META_FN = "clever-action";
const META_API   = "https://api.microlink.io/?url=";
/* Reddit / X / sites qui bloquent les robots : Microlink gratuit se fait bloquer.
   Exabase passe l'anti-bot (rotation de proxys + rendu JS) — 20 000 aperçus/mois GRATUITS.
   → crée un compte sur exabase.io, copie ta clé, colle-la ci-dessous. Vide = désactivé.
   ⚠️ la clé est visible dans le code source (ok pour un usage perso). */
const META_EXABASE_KEY = "";
const IMG_PROXY  = "https://wsrv.nl/?url=";
const LINK_PROXY = "https://api.allorigins.win/raw?url=";
/* ========================================================= */
applyTheme();
const _sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let USER=null;
/* Couche de stockage synchronisée : même interface que window.storage, adossée à une table "kv" Supabase */
window.storage={
  async get(key){const{data,error}=await _sb.from('kv').select('value').eq('user_id',USER.id).eq('key',key).maybeSingle();if(error)throw error;return data?{key,value:data.value}:null;},
  async set(key,value){const{error}=await _sb.from('kv').upsert({user_id:USER.id,key,value,updated_at:new Date().toISOString()},{onConflict:'user_id,key'});if(error)throw error;return{key,value};},
  async delete(key){await _sb.from('kv').delete().eq('user_id',USER.id).eq('key',key);return{key,deleted:true};},
  async list(prefix){let q=_sb.from('kv').select('key').eq('user_id',USER.id);if(prefix)q=q.like('key',prefix.replace(/[%_\\]/g,'\\$&')+'%');const{data}=await q;return{keys:(data||[]).map(r=>r.key)};}
};
const gate=document.getElementById('authgate');
const authMsg=document.getElementById('authMsg');
const authBtn=document.getElementById('authBtn');
const authEmail=document.getElementById('authEmail');
let started=false;
function showApp(){gate.hidden=true;if(!started){started=true;startApp();}}
function showGate(){gate.hidden=false;}
function onSession(session){if(session&&session.user){USER=session.user;showApp();}else{showGate();}}
authBtn.onclick=async()=>{
  const email=(authEmail.value||'').trim();
  if(!email){authMsg.textContent='Entre ton e-mail.';return;}
  authBtn.disabled=true;authMsg.textContent='Envoi du lien…';
  const{error}=await _sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.href.split('#')[0]}});
  authBtn.disabled=false;
  authMsg.textContent=error?('Erreur : '+error.message):'Lien envoyé ! Ouvre-le sur cet appareil pour te connecter.';
};
authEmail.addEventListener('keydown',e=>{if(e.key==='Enter')authBtn.click();});
const _so=document.getElementById('signout');
if(_so)_so.onclick=async()=>{await _sb.auth.signOut();location.reload();};
_sb.auth.onAuthStateChange((_e,session)=>onSession(session));
(async()=>{const{data:{session}}=await _sb.auth.getSession();onSession(session);})();
</script>
</body>
</html>
