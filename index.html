  :root{
    /* Sable — palette sable (thème clair : papier sablé, lumière chaude) */
    --bg:#F7F2E9; --surface:#FFFDF9; --surface-2:#F1EADC; --surface-3:#E9E0CE;
    --border:#E7DDCB; --border-2:#DBCFB8;
    --text:#20190F; --text-2:#6D6353; --text-3:#9C8F79;
    --accent:#AE7127; --accent-hover:#95601D; --accent-soft:#F3E7D1; --accent-ink:#FFFFFF;
    --green:#3E8E5E; --green-soft:#E7F1E5; --red:#C4553C; --red-soft:#F7E7DF;
    --mono:"Geist Mono","JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;
    --radius:12px; --radius-lg:16px;
    --sh-sm:0 1px 2px rgba(60,45,20,.06),0 1px 2px rgba(60,45,20,.05);
    --sh-card:0 10px 34px -14px rgba(70,50,20,.18),0 2px 8px -3px rgba(70,50,20,.08);
  }
  /* ---------- dark theme ---------- */
  :root[data-theme="dark"]{
    /* Sable — palette sable (thème sombre : dune de nuit, sable humide) */
    --bg:#14110C; --surface:#1D1913; --surface-2:#241F17; --surface-3:#2F281E;
    --border:#2E2820; --border-2:#3D3527;
    --text:#F0E9DB; --text-2:#B0A692; --text-3:#7B7261;
    --accent:#D8A25A; --accent-hover:#E7B673; --accent-soft:#2C2214; --accent-ink:#241A0A;
    --green:#5CB07E; --green-soft:#16261B; --red:#E58163; --red-soft:#2C1810;
    --sh-sm:0 1px 2px rgba(0,0,0,.45);
    --sh-card:0 14px 44px -14px rgba(0,0,0,.7),0 3px 10px -4px rgba(0,0,0,.55);
  }
  :root[data-theme="dark"] body::before{
    background:radial-gradient(120% 100% at 50% 0%, rgba(216,162,90,.14) 0%, transparent 72%);opacity:1}
  .tb-right{display:flex;align-items:center;gap:10px}
  .theme-btn{background:var(--surface);border:1px solid var(--border-2);color:var(--text-2);
    width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:.15s;flex-shrink:0}
  .theme-btn:hover{color:var(--text);border-color:var(--text-3)}
  .theme-btn:active{transform:scale(.94)}
  .theme-btn svg{width:16px;height:16px}
  .theme-btn .i-sun{display:none}
  :root[data-theme="dark"] .theme-btn .i-sun{display:block}
  :root[data-theme="dark"] .theme-btn .i-moon{display:none}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  html{overflow-x:hidden}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"Geist",Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    line-height:1.45;overflow-x:hidden;
  }
  body::before{content:"";position:fixed;inset:0 0 auto 0;height:340px;pointer-events:none;z-index:0;
    background:radial-gradient(120% 100% at 50% 0%, #F5EAD3 0%, transparent 70%);opacity:.7}
  #app{position:relative;z-index:1;max-width:540px;margin:0 auto;min-height:100%;
    padding:0 18px calc(30px + env(safe-area-inset-bottom));}

  /* ---------- top bar ---------- */
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:24px 2px 16px}
  .wordmark{font-family:"Sable Display","Geist",Inter,system-ui,sans-serif;font-weight:400;
    font-size:24px;letter-spacing:.005em;color:var(--text);
    display:flex;align-items:center;gap:10px}
  .wordmark .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 4px var(--accent-soft);animation:pulse 3.6s ease-in-out infinite}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 3px var(--accent-soft)}50%{box-shadow:0 0 0 6px var(--accent-soft)}}
  .pile-count{font-family:var(--mono);font-size:12px;color:var(--text-3);letter-spacing:-.01em}
  .pile-count b{color:var(--accent);font-weight:600}

  /* ---------- capture ---------- */
  .capture{display:flex;gap:7px;background:var(--surface);border:1px solid var(--border-2);
    border-radius:var(--radius);padding:6px 6px 6px 14px;align-items:center;box-shadow:var(--sh-sm);
    transition:border-color .16s,box-shadow .16s}
  .capture:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .capture input{flex:1;background:none;border:none;color:var(--text);font-size:15px;
    font-family:inherit;outline:none;min-width:0}
  .capture input::placeholder{color:var(--text-3)}
  .capture button{flex-shrink:0;background:var(--accent);color:var(--accent-ink);border:none;
    font-family:inherit;font-weight:500;font-size:14px;border-radius:9px;padding:10px 15px;
    cursor:pointer;transition:background .14s,transform .12s;display:flex;align-items:center;gap:6px}
  .capture button:hover{background:var(--accent-hover)}
  .capture button:active{transform:scale(.96)}
  .capture button svg{width:15px;height:15px}

  /* ---------- tabs (segmented control) ---------- */
  .tabs{display:flex;gap:3px;margin:18px 0 10px;background:var(--surface-2);
    border:1px solid var(--border);border-radius:11px;padding:3px}
  .tabs button{flex:1;background:none;border:none;color:var(--text-2);font-family:inherit;
    font-weight:500;font-size:13.5px;padding:8px;border-radius:8px;cursor:pointer;transition:.15s}
  .tabs button.active{background:var(--surface);color:var(--text);box-shadow:var(--sh-sm)}

  section[hidden]{display:none}

  /* ---------- surfacing card ---------- */
  #stage{position:relative;min-height:270px;padding:10px 0 4px}
  .card{position:relative;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius-lg);padding:22px 20px 18px;box-shadow:var(--sh-card);overflow:hidden}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);transform-origin:center}
  .card .kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:.11em;text-transform:uppercase;
    color:var(--accent);font-weight:500;display:flex;align-items:center;gap:6px;margin-bottom:15px}
  .card .kicker .rise{width:13px;height:13px;color:var(--accent)}
  .card .content{font-size:21px;line-height:1.36;font-weight:500;letter-spacing:-.012em;
    color:var(--text);word-break:break-word}
  .card .content.islink{font-size:18px;font-weight:500}
  .card a.link{color:var(--accent);text-decoration:none;border-bottom:1.5px solid var(--accent-soft);
    font-weight:500;transition:border-color .14s}
  .card a.link:hover{border-bottom-color:var(--accent)}
  .card .meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:16px;align-items:center}
  .badge{font-family:var(--mono);font-size:11px;font-weight:500;padding:3px 9px;border-radius:7px;
    background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
  .badge.none{background:var(--accent-soft);color:var(--accent);border-color:transparent}
  .badge.time{background:none;border:none;color:var(--text-3);padding-left:2px}

  /* hiérarchie : 1 action primaire large + 3 secondaires discrètes */
  .actions{display:flex;flex-direction:column;gap:8px;margin-top:16px}
  .act-keep{width:100%;font-family:inherit;font-weight:600;font-size:15px;padding:13px;border-radius:11px;
    cursor:pointer;border:1px solid var(--accent);background:var(--accent);color:var(--accent-ink);
    display:flex;align-items:center;justify-content:center;gap:8px;transition:.14s}
  .act-keep:hover{background:var(--accent-hover)}
  .act-keep:active{transform:scale(.98)}
  .act-more{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .act-more button{font-family:inherit;font-weight:500;font-size:13px;padding:11px 8px;border-radius:9px;
    cursor:pointer;border:1px solid var(--border-2);background:var(--surface);color:var(--text-2);
    transition:.14s;display:flex;align-items:center;justify-content:center;gap:6px}
  .act-more button:active{transform:scale(.97)}
  .act-more .act-file:hover{border-color:var(--accent);color:var(--accent)}
  .act-more .act-archive:hover{border-color:var(--text-3);color:var(--text)}
  .act-more .act-trash:hover{background:var(--red-soft);border-color:var(--red);color:var(--red)}
  .actions button svg{width:15px;height:15px}

  /* classify panel */
  .classify{margin-top:12px;background:var(--surface-2);border:1px solid var(--border);
    border-radius:12px;padding:13px}
  .classify p{font-size:12.5px;color:var(--text-2);margin-bottom:9px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:9px}
  .chip{font-family:inherit;font-size:13px;font-weight:500;padding:6px 12px;border-radius:8px;
    background:var(--surface);color:var(--text-2);border:1px solid var(--border-2);cursor:pointer;transition:.14s}
  .chip:hover{border-color:var(--accent);color:var(--accent)}
  .newdom{display:flex;gap:7px}
  .newdom input{flex:1;background:var(--surface);border:1px solid var(--border-2);border-radius:9px;
    color:var(--text);font-family:inherit;font-size:14px;padding:9px 12px;outline:none}
  .newdom input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .newdom button{background:var(--accent);color:var(--accent-ink);border:none;font-family:inherit;
    font-weight:500;border-radius:9px;padding:0 15px;cursor:pointer}
  .newdom button:hover{background:var(--accent-hover)}

  .batch-bar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:18px}
  .progress{display:flex;gap:5px;align-items:center;flex-wrap:wrap;flex:1;min-width:0}
  .pip{width:18px;height:3px;border-radius:2px;background:var(--border-2);transition:.2s}
  .pip.done{background:var(--accent)}
  .pip.now{background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .pull{background:var(--surface);border:1px solid var(--border-2);color:var(--text-2);flex-shrink:0;
    font-family:inherit;font-weight:500;font-size:13px;padding:8px 13px;border-radius:9px;cursor:pointer;transition:.14s}
  .pull:hover{border-color:var(--accent);color:var(--accent)}

  /* empty / done states */
  .rest{text-align:center;padding:46px 16px}
  .rest .big{font-size:20px;font-weight:600;letter-spacing:-.015em;color:var(--text);margin-bottom:8px}
  .rest .sub{color:var(--text-2);font-size:14.5px;max-width:330px;margin:0 auto 18px;line-height:1.5}

  /* ---------- pile / search ---------- */
  .search{width:100%;background:var(--surface);border:1px solid var(--border-2);border-radius:11px;
    color:var(--text);font-family:inherit;font-size:15px;padding:11px 14px;outline:none;margin-bottom:12px;transition:.16s}
  .search::placeholder{color:var(--text-3)}
  .search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .filters{display:flex;gap:7px;flex-wrap:wrap;padding-bottom:10px;margin-bottom:2px}
  .filters .chip.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .filters .chip.active:hover{color:var(--accent-ink)}

  .row{display:flex;gap:12px;align-items:flex-start;padding:14px 4px;border-bottom:1px solid var(--border)}
  .row .body{flex:1;min-width:0}
  .row .txt{font-size:15px;color:var(--text);word-break:break-word;line-height:1.4}
  .row .txt.arch{color:var(--text-3);text-decoration:line-through}
  .row a{color:var(--accent);text-decoration:none}
  .row a:hover{text-decoration:underline}
  .row .sub{font-family:var(--mono);font-size:11px;color:var(--text-3);margin-top:5px;
    display:flex;gap:9px;flex-wrap:wrap;align-items:center;letter-spacing:-.01em}
  .row .mini{font-family:var(--mono);font-size:10px;font-weight:500;letter-spacing:.02em;text-transform:uppercase;
    padding:2px 7px;border-radius:6px;background:var(--surface-2);color:var(--text-2);border:1px solid var(--border)}
  .row .mini.none{color:var(--accent);background:var(--accent-soft);border-color:transparent}
  .rowbtn{background:none;border:none;color:var(--text-3);cursor:pointer;padding:9px;border-radius:9px;flex-shrink:0;transition:.14s}
  .rowbtn:hover{color:var(--red);background:var(--red-soft)}
  .rowbtn svg{width:17px;height:17px;display:block}
  .empty-list{text-align:center;color:var(--text-3);padding:46px 20px;font-size:14.5px}
  /* selecteur d'affichage (liste / galerie) */
  .viewseg{display:flex;gap:2px;background:var(--surface-2);border:1px solid var(--border);
    border-radius:10px;padding:3px;flex-shrink:0;align-self:center}
  .vseg{background:none;border:none;color:var(--text-3);width:38px;height:32px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:.14s}
  .vseg svg{width:18px;height:18px}
  .vseg.active{background:var(--surface);color:var(--accent);box-shadow:var(--sh-sm)}
  .vseg:not(.active):hover{color:var(--text-2)}
  /* accueil de Ma pile : grille de domaines */
  .domgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:2px}
  .dcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;
    cursor:pointer;box-shadow:var(--sh-sm);text-align:left;padding:0;font-family:inherit;transition:.14s}
  .dcard:active{transform:scale(.97)}
  .dcard:hover{border-color:var(--border-2)}
  .dcover{aspect-ratio:2/1;background:var(--surface-2);display:flex;align-items:center;justify-content:center;
    overflow:hidden;border-bottom:1px solid var(--border)}
  .dcover img{width:100%;height:100%;object-fit:cover;display:block}
  .dcover svg{width:22px;height:22px;color:var(--text-3)}
  .dcover .ph{font-family:var(--mono);font-size:11px;color:var(--text-3)}
  .dcover.accent{background:var(--accent-soft)}
  .dbody{padding:10px 12px 11px;display:flex;align-items:baseline;justify-content:space-between;gap:8px}
  .dname{font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--text);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dcount{font-family:var(--mono);font-size:11.5px;color:var(--text-3);flex-shrink:0}
  .rowlink{display:flex;justify-content:space-between;align-items:center;width:100%;background:none;
    border:none;border-top:1px solid var(--border);font-family:inherit;font-size:14.5px;color:var(--text-2);
    padding:15px 4px;margin-top:16px;cursor:pointer;transition:.13s}
  .rowlink:hover{color:var(--text)}
  .rowlink .n{font-family:var(--mono);font-size:12px;color:var(--text-3)}
  /* fil d'ariane de collection */
  .crumb{display:flex;align-items:center;gap:9px;margin:2px 0 12px}
  .crumb .back{background:var(--surface);border:1px solid var(--border-2);color:var(--text-2);
    width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;transition:.14s}
  .crumb .back:hover{color:var(--text);border-color:var(--text-3)}
  .crumb .back svg{width:17px;height:17px}
  .crumb .path{flex:1;min-width:0;display:flex;align-items:baseline;gap:7px}
  .crumb .root{font-size:12.5px;color:var(--text-3);flex-shrink:0}
  .crumb .sep{color:var(--text-3);font-size:12.5px;flex-shrink:0}
  .crumb .cur{font-size:16.5px;font-weight:600;letter-spacing:-.012em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .crumb .cnt{font-family:var(--mono);font-size:11.5px;color:var(--text-3);flex-shrink:0}
  /* bouton tri */
  .sortbtn{background:var(--surface-2);border:1px solid var(--border);color:var(--text-3);
    width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    cursor:pointer;flex-shrink:0;transition:.14s}
  .sortbtn svg{width:17px;height:17px}
  .sortbtn:hover{color:var(--text-2)}
  .sortbtn.on{background:var(--accent-soft);color:var(--accent);border-color:transparent}
  /* panneau bas (tri, reglages) */
  .sheet-overlay{position:fixed;inset:0;background:rgba(20,15,8,.45);z-index:40;opacity:0;pointer-events:none;transition:opacity .22s}
  .sheet-overlay.open{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:var(--surface);
    border:1px solid var(--border);border-bottom:none;border-radius:18px 18px 0 0;
    max-width:540px;margin:0 auto;max-height:72vh;display:flex;flex-direction:column;
    transform:translateY(105%);transition:transform .26s cubic-bezier(.2,.8,.2,1);
    padding-bottom:env(safe-area-inset-bottom);box-shadow:0 -12px 40px -10px rgba(40,28,10,.25)}
  .sheet.open{transform:none}
  .sheet .grab{width:36px;height:4px;border-radius:2px;background:var(--border-2);margin:10px auto 4px;flex-shrink:0}
  .sheet h2{font-size:15px;font-weight:600;letter-spacing:-.01em;padding:8px 18px 10px;flex-shrink:0}
  .sheet .slist{overflow-y:auto;padding:0 10px 14px}
  .srow{display:flex;align-items:center;justify-content:space-between;width:100%;gap:10px;
    background:none;border:none;font-family:inherit;font-size:15px;color:var(--text);
    padding:13px 10px;border-radius:10px;cursor:pointer;text-align:left;transition:.13s}
  .srow:hover{background:var(--surface-2)}
  .srow.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
  .srow .n{font-family:var(--mono);font-size:12px;color:var(--text-3)}
  .srow.active .n{color:var(--accent)}
  .srow .ck{width:16px;height:16px;flex-shrink:0;opacity:0}
  .srow.active .ck{opacity:1}
  .sheet .sdiv{height:1px;background:var(--border);margin:6px 10px}
  .sheet .ssec{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);padding:10px 12px 7px}
  .sheet .schips{display:flex;flex-wrap:wrap;gap:7px;padding:0 12px 10px}
  .sheet .schips .chip.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  @media (prefers-reduced-motion: reduce){.sheet,.sheet-overlay{transition:none}}
  .gallery{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .gcard{position:relative;display:flex;flex-direction:column;background:var(--surface);
    border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--sh-sm)}
  .gcard .gmedia{aspect-ratio:16/10;background:var(--surface-2);display:flex;align-items:center;justify-content:center;overflow:hidden}
  .gcard .gmedia img{width:100%;height:100%;object-fit:cover;display:block}
  .gcard .gmedia svg{width:26px;height:26px;color:var(--text-3)}
  .gcard .gmedia .ph{font-family:var(--mono);font-size:11px;color:var(--text-3)}
  .gcard .gbody{padding:9px 11px 11px}
  .gcard .gtitle{font-size:13px;line-height:1.35;color:var(--text);word-break:break-word;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .gcard a.gtitle{color:var(--accent);text-decoration:none}
  .gcard .gsub{margin-top:7px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  .gcard .gdel{position:absolute;top:7px;right:7px;background:rgba(20,17,12,.5);border:none;color:#fff;
    border-radius:8px;padding:6px;cursor:pointer;display:flex;transition:.14s}
  .gcard .gdel:hover{background:var(--red)}
  .gcard .gdel svg{width:15px;height:15px;display:block}

  /* toast (dark, Linear-style) */
  #toast{position:fixed;left:50%;bottom:26px;transform:translate(-50%,20px);
    background:#1B1C22;border:1px solid #2C2D36;color:#fff;font-size:13.5px;font-weight:500;
    padding:11px 16px;border-radius:11px;opacity:0;pointer-events:none;transition:.28s;z-index:50;
    box-shadow:0 16px 40px -12px rgba(0,0,0,.4)}
  #toast.show{opacity:1;transform:translate(-50%,0)}
  #toast .u{color:var(--accent);text-decoration:none;font-weight:600;cursor:pointer;margin-left:10px}
  #toast .u:hover{text-decoration:underline}

  @media (prefers-reduced-motion: no-preference){
    .card{animation:surface .45s cubic-bezier(.2,.8,.2,1)}
    @keyframes surface{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
    .card::before{animation:lineIn .6s ease}
    @keyframes lineIn{from{opacity:0;transform:scaleX(.55)}to{opacity:1;transform:none}}
    .row{animation:fadein .28s ease}
    @keyframes fadein{from{opacity:0}to{opacity:1}}
  }
  /* ---------- capture (media, single row) ---------- */
  .capture{flex-direction:row;align-items:center;gap:6px;padding:6px 6px 6px 8px}
  .capture #captureInput{flex:1 1 auto;min-width:48px;padding:6px 2px}
  .capture #captureBtn{flex-shrink:0}
  .capture button.cap-icon{width:36px;height:36px;padding:0;border-radius:9px;background:var(--surface-2);
    border:1px solid var(--border-2);color:var(--text-2);font-weight:400;flex-shrink:0;display:flex;align-items:center;justify-content:center}
  .capture button.cap-icon:hover{color:var(--accent);border-color:var(--accent);background:var(--surface-2)}
  .capture button.cap-icon svg{width:17px;height:17px}
  .cap-hint{font-family:var(--mono);font-size:11px;color:var(--text-3);margin:8px 3px 2px;letter-spacing:-.01em;line-height:1.5}
  /* ---------- media in cards ---------- */
  .media{margin:2px 0 14px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--surface-2)}
  .media img,.media video{display:block;width:100%;max-height:360px;object-fit:contain;background:#0a0a0d}
  .media.audioblock{padding:12px;background:var(--surface-2)}
  .media audio{display:block;width:100%}
  .media iframe{display:block;width:100%;aspect-ratio:16/9;border:0;background:#000}
  .media .ph{aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-family:var(--mono);font-size:11px}
  .media.audioblock .ph{aspect-ratio:auto;padding:6px}
  .filename{font-family:var(--mono);font-size:12.5px;color:var(--text-2);word-break:break-all;line-height:1.4}
  .badge.type{background:var(--accent-soft);color:var(--accent);border-color:transparent;text-transform:uppercase;letter-spacing:.03em;font-size:10px}
  .row .thumb{width:48px;height:48px;border-radius:8px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);background:var(--surface-2)}
  .row .thumb-ic{width:48px;height:48px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);flex-shrink:0}
  .row .thumb-ic svg{width:20px;height:20px}
  .datatools{display:flex;gap:8px;margin:20px 2px 4px;padding-top:16px;border-top:1px solid var(--border)}
  .datbtn{flex:1;background:var(--surface);border:1px solid var(--border-2);color:var(--text-2);font-family:inherit;font-weight:500;font-size:13px;padding:10px;border-radius:10px;cursor:pointer;transition:.14s}
  .datbtn:hover{border-color:var(--accent);color:var(--accent)}
  .authgate{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:24px}
  .authgate[hidden]{display:none}
  .authcard{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:26px 22px;box-shadow:var(--sh-card);text-align:center}
  .authcard .wordmark{justify-content:center;margin-bottom:14px}
  .authsub{color:var(--text-2);font-size:14px;margin-bottom:18px;line-height:1.5}
  .authbtn{width:100%;margin-top:10px;background:var(--accent);color:var(--accent-ink);border:none;font-family:inherit;font-weight:600;font-size:14px;padding:12px;border-radius:11px;cursor:pointer}
  .authbtn:hover{background:var(--accent-hover)}
  .authbtn:disabled{opacity:.6;cursor:default}
  .authmsg{font-size:13px;color:var(--text-2);margin-top:14px;min-height:18px}
  .signout{background:none;border:none;color:var(--text-3);font-family:var(--mono);font-size:11px;text-decoration:underline;cursor:pointer;margin-top:12px}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  /* ---------- grain : notes en ligne ---------- */
  .grain-note{margin-top:12px;padding:10px 13px;background:var(--surface-2);border:1px solid var(--border);
    border-left:2px solid var(--accent);border-radius:8px;font-size:14px;line-height:1.45;color:var(--text-2);
    white-space:pre-wrap;word-break:break-word}
  .rownote{margin-top:6px;font-size:12.5px;color:var(--text-2);line-height:1.4;
    border-left:2px solid var(--accent-soft);padding-left:8px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .gnote{margin-top:6px;font-size:11.5px;color:var(--text-2);line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .row,.gcard{cursor:pointer}
  /* ---------- grain : bouton modifier sur la carte Surface ---------- */
  .card-edit{position:absolute;top:12px;right:12px;z-index:3;background:var(--surface-2);
    border:1px solid var(--border-2);color:var(--text-3);width:32px;height:32px;border-radius:9px;
    cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.14s}
  .card-edit:hover{color:var(--accent);border-color:var(--accent)}
  .card-edit:active{transform:scale(.94)}
  .card-edit svg{width:15px;height:15px}
  /* ---------- grain : formulaire d'édition (dans le panneau bas) ---------- */
  .sheet .gfld{padding:2px 12px 12px}
  .sheet .gfld>span{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;
    text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
  .sheet .gfld input,.sheet .gfld textarea{width:100%;min-width:0;max-width:100%;background:var(--surface-2);border:1px solid var(--border-2);
    border-radius:10px;color:var(--text);font-family:inherit;font-size:15px;padding:10px 12px;outline:none;resize:vertical;line-height:1.4}
  .sheet .gfld input:focus,.sheet .gfld textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .sheet .gfld .gfile{font-family:var(--mono);font-size:13px;color:var(--text-2);word-break:break-all;
    background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
  .sheet .gdomwrap{display:flex;flex-wrap:wrap;gap:7px;padding:0 0 10px}
  .sheet .gdom.active{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
  .sheet .gdom.active:hover{color:var(--accent-ink)}
  .sheet .gprev{margin:2px 12px 12px;border-radius:12px;overflow:hidden;border:1px solid var(--border);background:var(--surface-2)}
  .sheet .gprev img{display:block;width:100%;max-height:60vh;object-fit:contain;background:#0a0a0d;cursor:zoom-in}
  .sheet .gactions{display:flex;flex-wrap:wrap;gap:7px;padding:2px 12px 12px}
  .sheet .gactions .chip{cursor:pointer}
  .sheet .gdanger{color:var(--red);border-color:var(--border-2)}
  .sheet .gdanger:hover{border-color:var(--red);color:var(--red)}
  .sheet .gsave{display:block;width:calc(100% - 24px);margin:2px 12px 6px;background:var(--accent);
    color:var(--accent-ink);border:none;font-family:inherit;font-weight:600;font-size:15px;padding:13px;
    border-radius:12px;cursor:pointer;transition:background .14s}
  .sheet .gsave:hover{background:var(--accent-hover)}
  .sheet .gsave:active{transform:scale(.99)}
  .wordmark .wm{display:inline-flex;align-items:flex-start}
  .wordmark .appver{font-family:var(--mono);font-size:9.5px;font-weight:500;line-height:1;
    color:var(--text-3);letter-spacing:0;margin-left:3px;margin-top:1px;top:0}
  /* ---------- zoom plein écran ---------- */
  .zoomable{cursor:zoom-in}
  .lightbox{position:fixed;inset:0;z-index:90;background:rgba(8,6,3,.94);display:flex;
    align-items:center;justify-content:center;padding:16px;cursor:zoom-out}
  .lightbox[hidden]{display:none}
  .lightbox img{max-width:100%;max-height:100%;object-fit:contain;border-radius:6px}
  .lightbox .lb-x{position:absolute;top:calc(12px + env(safe-area-inset-top));right:14px;
    background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.28);color:#fff;
    width:38px;height:38px;border-radius:11px;font-size:17px;cursor:pointer;line-height:1}
  /* ---------- vue étendue (Étendu) : images en proportions naturelles ---------- */
  .feed{display:flex;flex-direction:column;gap:14px}
  .fcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;
    overflow:hidden;box-shadow:var(--sh-sm);cursor:pointer}
  .fcard.arch{opacity:.65}
  .fmedia{background:var(--surface-2);display:block;line-height:0}
  .fmedia img{display:block;width:100%;height:auto}   /* pas de crop : aspect réel */
  .fbody{padding:11px 13px 13px}
  .ftop{display:flex;align-items:flex-start;gap:10px}
  .ftitle{flex:1;font-size:15px;line-height:1.4;color:var(--text);word-break:break-word;text-decoration:none}
  a.ftitle{color:var(--accent)}
  a.ftitle:hover{text-decoration:underline}
  .fcard.arch .ftitle{color:var(--text-3);text-decoration:line-through}
  .fdel{flex-shrink:0}
  .fsub{margin-top:7px;display:flex;gap:9px;flex-wrap:wrap;align-items:center;
    font-family:var(--mono);font-size:11px;color:var(--text-3);letter-spacing:-.01em}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="wordmark"><span class="dot"></span><span class="wm">Sable<sup class="appver" id="appVer"></sup></span></div>
    <div class="tb-right">
      <div class="pile-count"><b id="pileCount">0</b> en pile</div>

  <div class="capture">

    <button class="cap-icon" id="btnFile" title="Joindre un fichier" aria-label="Joindre un fichier audio, vidéo ou image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
    <input id="captureInput" placeholder="Lien, idée, typo…" autocomplete="off" aria-label="Ajouter à ta pile">
    <button id="captureBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Garder</button>

<script>
/* Numéro affiché à côté de « Sable ». Incrémente-le à chaque déploiement,
   et note en une ligne ce qui change — c'est ton mini-changelog + un repère
   pour vérifier qu'une nouvelle version est bien servie (pas le vieux cache).
   v1.0 — base : capture, résurgence, pile/collections, thèmes, partage entrant
   v1.1 — aperçus de liens (Open Graph) + notes + fiche d'édition d'un grain
   v1.2 — la fiche s'ouvre automatiquement après un partage (si 1 seul grain)
   v1.3 — numéro de version affiché dans le titre
   v1.4 — aperçus via Microlink (allorigins lâchait) + image passée par un cache (wsrv.nl)
   v1.5 — images non recadrées + zoom plein écran + vue « Étendu » + Reddit/X via Exabase (option clé)
   v1.6 — correctif largeur : la barre de progression débordait quand le lot grossissait
   v1.7 — aperçu « maison » possible via une Edge Function Supabase (comme WhatsApp, sans service tiers)
   v1.8 — branché sur la fonction Supabase déployée (clever-action) */
const APP_VERSION="v1.8";
{const _v=document.getElementById("appVer");if(_v)_v.textContent=APP_VERSION;}
const KEY_ITEMS="brain:v1:items";
const KEY_BATCH="brain:v1:batch";
const KEY_SETTINGS="brain:v1:settings";
const DEFAULT_SETTINGS={startTab:"surface",theme:"auto",batchSize:5,lastTab:"surface"};
let settings={...DEFAULT_SETTINGS};
const BATCH_SIZE=()=>settings.batchSize;
const KEY_THEME="brain:v1:theme";
const KEY_MEDIA="brain:v1:media:";
const MEDIA_MAX=4800000;

let items=[];
let batch={date:"",ids:[],idx:0};
let pileLoc=null;      /* null = accueil de Ma pile ; sinon "all"|"none"|"archived"|nom de domaine */
let typeFilter="all";
let sortMode="recent";
let pileView="list";
let lastTrashed=null;

/* ---------- theme ---------- */
function effTheme(){return settings.theme==="auto"?((window.matchMedia&&matchMedia("(prefers-color-scheme: dark)").matches)?"dark":"light"):settings.theme;}
function applyTheme(){document.documentElement.setAttribute("data-theme",effTheme());}
function loadSettings(){
  try{
    const raw=localStorage.getItem(KEY_SETTINGS);
    if(raw)settings={...DEFAULT_SETTINGS,...JSON.parse(raw)};
    else{const legacy=localStorage.getItem(KEY_THEME);if(legacy)settings.theme=legacy;} /* migration ancien reglage theme */
  }catch(e){}
  applyTheme();
}
function saveSettings(){try{localStorage.setItem(KEY_SETTINGS,JSON.stringify(settings));}catch(e){}}
function toggleTheme(){settings.theme=effTheme()==="dark"?"light":"dark";applyTheme();saveSettings();}
loadSettings();

/* ---------- storage ---------- */
async function loadState(){
  try{const r=await window.storage.get(KEY_ITEMS); items=r&&r.value?JSON.parse(r.value):[];}
  catch(e){items=[];}
  items=items.map(normalizeItem);
  try{const r=await window.storage.get(KEY_BATCH); if(r&&r.value)batch=JSON.parse(r.value);}
  catch(e){}
}
async function saveItems(){try{await window.storage.set(KEY_ITEMS,JSON.stringify(items));}catch(e){console.error(e);}}
async function saveBatch(){try{await window.storage.set(KEY_BATCH,JSON.stringify(batch));}catch(e){}}

/* ---------- helpers ---------- */
const todayStr=()=>new Date().toISOString().slice(0,10);
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const isUrl=s=>/^https?:\/\//i.test(s.trim());
function labelFor(it){
  if(it.url){try{const u=new URL(it.url);return u.hostname.replace(/^www\./,"")+(u.pathname.length>1?u.pathname:"");}catch(e){return it.url;}}
  return it.content;
}
function ago(ts){
  const d=Math.floor((Date.now()-ts)/86400000);
  if(d<=0)return"aujourd’hui";
  if(d===1)return"hier";
  if(d<7)return"il y a "+d+" j";
  if(d<30)return"il y a "+Math.floor(d/7)+" sem";
  return"il y a "+Math.floor(d/30)+" mois";
}
function domains(){return[...new Set(items.filter(i=>i.status!=="trashed"&&i.domain).map(i=>i.domain))];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ---------- media helpers ---------- */
const mediaCache={};
function ytId(u){if(!u)return null;const m=String(u).match(/(?:youtube\.com\/(?:watch\?v=|embed\/|shorts\/|live\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);return m?m[1]:null;}
function mediaExt(u){const m=String(u).split(/[?#]/)[0].toLowerCase().match(/\.(jpg|jpeg|png|gif|webp|avif|svg|mp3|wav|ogg|m4a|aac|flac|mp4|webm|mov|m4v)$/);if(!m)return null;const e=m[1];if(["jpg","jpeg","png","gif","webp","avif","svg"].includes(e))return"image";if(["mp3","wav","ogg","m4a","aac","flac"].includes(e))return"audio";return"video";}
function detectType(v){if(!isUrl(v))return{type:"note",url:null};const url=v.trim();if(ytId(url))return{type:"youtube",url};return{type:mediaExt(url)||"link",url};}
function normalizeItem(it){if(!it.type)it.type=it.url?detectType(it.url).type:"note";if(it.hasMedia===undefined)it.hasMedia=false;if(it.title===undefined)it.title=null;if(it.preview===undefined)it.preview=null;if(it.note===undefined)it.note="";return it;}
function slotIntoBatch(it){if(batch.date===todayStr()&&!batch.ids.includes(it.id)){batch.ids.splice(batch.idx,0,it.id);saveBatch();}}
async function getMedia(id){if(id in mediaCache)return mediaCache[id];try{const r=await window.storage.get(KEY_MEDIA+id);mediaCache[id]=r&&r.value?r.value:null;}catch(e){mediaCache[id]=null;}return mediaCache[id];}
async function setMedia(id,data){try{const ok=await window.storage.set(KEY_MEDIA+id,data);mediaCache[id]=data;return !!ok;}catch(e){console.error(e);return false;}}
function fileToDataUrl(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error("read"));r.readAsDataURL(file);});}
function fileToImage(file,maxDim,q){return new Promise((res,rej)=>{const url=URL.createObjectURL(file);const img=new Image();img.onload=()=>{let w=img.naturalWidth,h=img.naturalHeight;const s=Math.min(1,maxDim/Math.max(w,h));w=Math.round(w*s);h=Math.round(h*s);const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);URL.revokeObjectURL(url);try{res(c.toDataURL("image/jpeg",q));}catch(e){rej(e);}};img.onerror=()=>{URL.revokeObjectURL(url);rej(new Error("img"));};img.src=url;});}

/* ---------- resurfacing algorithm: variety across domains + unclassified ---------- */
function buildBatch(){
  const active=items.filter(i=>i.status==="active");
  const groups={};
  for(const it of active){(groups[it.domain||"__none__"]??=[]).push(it);}
  for(const k in groups){
    groups[k].sort((a,b)=>(a.lastSurfaced||0)-(b.lastSurfaced||0)); // least-recently-seen first
    // light randomness within the top of each group
    const top=groups[k].splice(0,Math.min(4,groups[k].length));
    groups[k]=shuffle(top).concat(groups[k]);
  }
  const keys=shuffle(Object.keys(groups));
  const out=[];let progress=true;
  while(progress&&out.length<BATCH_SIZE()){
    progress=false;
    for(const k of keys){if(groups[k].length){out.push(groups[k].shift());progress=true;if(out.length>=BATCH_SIZE())break;}}
  }
  batch={date:todayStr(),ids:out.map(i=>i.id),idx:0};
  saveBatch();
}
function ensureBatch(){
  const active=items.filter(i=>i.status==="active");
  if(batch.date!==todayStr()||(batch.ids.length===0&&active.length>0)){buildBatch();}
}
function currentCardId(){
  while(batch.idx<batch.ids.length){
    const it=items.find(i=>i.id===batch.ids[batch.idx]);
    if(it&&it.status==="active")return it.id;
    batch.idx++;
  }
  return null;
}

/* ---------- actions ---------- */
async function addItem(raw,meta){
  const v=raw.trim();if(!v)return;
  const d=detectType(v);
  let title=null;
  if(meta&&meta.title){const t=String(meta.title).trim();if(t&&t!==v)title=t;}
  const it=normalizeItem({id:uid(),type:d.type,mime:"",hasMedia:false,content:v,url:d.url,domain:null,title,preview:null,
    createdAt:Date.now(),lastSurfaced:null,surfaceCount:0,status:"active"});
  items.unshift(it);slotIntoBatch(it);
  await saveItems();renderAll();
  toast(d.type==="youtube"?"Grain YouTube gardé.":"Grain gardé.",{label:"annoter",fn:()=>openGrainSheet(it.id)});
  if(it.url)enrich(it.id);
  return it.id;
}
async function addImageFile(file){
  toast("Compression de l’image…");
  try{
    let data=await fileToImage(file,1600,.85);
    if(data.length>MEDIA_MAX)data=await fileToImage(file,1100,.7);
    if(data.length>MEDIA_MAX){toast("Image trop lourde pour être gardée.");return;}
    const id=uid();
    const it={id,type:"image",mime:"image/jpeg",hasMedia:true,content:file.name||"Photo",url:null,domain:null,note:"",
      createdAt:Date.now(),lastSurfaced:null,surfaceCount:0,status:"active"};
    if(!await setMedia(id,data)){toast("Stockage plein.");return;}
    items.unshift(it);slotIntoBatch(it);await saveItems();renderAll();toast("Photo gardée.",{label:"annoter",fn:()=>openGrainSheet(id)});
    return id;
  }catch(e){toast("Impossible de lire l’image.");}
}
async function addMediaFile(file,type){
  const lbl=type==="video"?"Vidéo":"Audio";
  toast("Lecture du fichier…");
  try{
    const data=await fileToDataUrl(file);
    if(data.length>MEDIA_MAX){toast(lbl+" trop lourd (~5 Mo max). Pour du lourd, colle plutôt un lien.");return;}
    const id=uid();
    const it={id,type,mime:file.type||"",hasMedia:true,content:file.name||type,url:null,domain:null,note:"",
      createdAt:Date.now(),lastSurfaced:null,surfaceCount:0,status:"active"};
    if(!await setMedia(id,data)){toast("Stockage plein.");return;}
    items.unshift(it);slotIntoBatch(it);await saveItems();renderAll();toast(lbl+" gardé.",{label:"annoter",fn:()=>openGrainSheet(id)});
    return id;
  }catch(e){toast("Fichier illisible.");}
}
function routeFile(f){
  if(!f)return;
  if(f.type.startsWith("image/"))addImageFile(f);
  else if(f.type.startsWith("audio/"))addMediaFile(f,"audio");
  else if(f.type.startsWith("video/"))addMediaFile(f,"video");
  else toast("Type de fichier non pris en charge.");
}

/* ---------- export / import ---------- */
async function exportData(){
  toast("Préparation de l’export…");
  const out={app:"sable",version:1,exportedAt:new Date().toISOString(),items,media:{}};
  for(const it of items){if(it.hasMedia){const d=await getMedia(it.id);if(d)out.media[it.id]=d;}}
  try{
    const blob=new Blob([JSON.stringify(out)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="sable-"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),3000);
    toast("Export téléchargé ("+items.length+" grains).");
  }catch(e){toast("Export impossible ici.");}
}
async function importData(file){
  try{
    const data=JSON.parse(await file.text());
    if(!data||!Array.isArray(data.items)){toast("Fichier d’import invalide.");return;}
    const have=new Set(items.map(i=>i.id));let added=0;
    if(data.media){for(const id in data.media){await setMedia(id,data.media[id]);}}
    for(const raw of data.items){if(!have.has(raw.id)){items.push(normalizeItem(raw));have.add(raw.id);added++;}}
    items.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    await saveItems();renderAll();
    toast(added+" grain"+(added>1?"s":"")+" importé"+(added>1?"s":"")+".");
  }catch(e){toast("Import impossible (fichier illisible).");}
}
async function markSurfaced(id){
  const it=items.find(i=>i.id===id);if(it){it.lastSurfaced=Date.now();it.surfaceCount++;}
}
async function keepCard(id){await markSurfaced(id);advance();await saveItems();renderStage();updateCounts();toast("Gardé en pile.");}
async function archiveCard(id){const it=items.find(i=>i.id===id);if(it)it.status="archived";advance();await saveItems();renderAll();toast("Mis de côté.");}
async function trashCard(id){const it=items.find(i=>i.id===id);if(it){it.status="trashed";lastTrashed=id;}advance();await saveItems();renderAll();toast("Jeté.",true);}
async function classifyCard(id,dom){const it=items.find(i=>i.id===id);if(it){it.domain=dom;await markSurfaced(id);}advance();await saveItems();renderAll();toast("Classé dans “"+dom+"”.");}
function advance(){batch.idx++;saveBatch();}

async function undoTrash(){if(!lastTrashed)return;const it=items.find(i=>i.id===lastTrashed);if(it)it.status="active";lastTrashed=null;await saveItems();renderAll();}
async function deleteRow(id){const it=items.find(i=>i.id===id);if(it){it.status="trashed";lastTrashed=id;}await saveItems();renderAll();toast("Jeté.",true);}
async function restoreRow(id){const it=items.find(i=>i.id===id);if(it)it.status="active";await saveItems();renderAll();toast("Remis en pile.");}

/* ---------- rendering ---------- */
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function contentHTML(it,big){
  if(it.url){const lbl=esc(labelFor(it));return `<a class="link" href="${esc(it.url)}" target="_blank" rel="noopener">${lbl}</a>`;}
  return esc(it.content);
}

const TYPE_LABEL={note:"note",link:"lien",youtube:"youtube",image:"photo",audio:"audio",video:"vidéo"};
function typeLabel(it){return TYPE_LABEL[it.type]||"note";}
function isMediaType(t){return t==="image"||t==="audio"||t==="video";}
const ICON_AUDIO='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>';
const ICON_VIDEO='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m23 7-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>';
function mediaBlockBig(it){
  if(it.type==="youtube"){const yid=ytId(it.url);return yid?`<div class="media"><iframe src="https://www.youtube-nocookie.com/embed/${yid}" loading="lazy" allow="accelerometer;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen></iframe></div>`:"";}
  if(it.type==="link"&&it.preview)return `<div class="media"><img class="zoomable" data-full="${esc(it.preview)}" src="${esc(it.preview)}" alt="" loading="lazy"></div>`;
  if(it.type==="image")return it.hasMedia?`<div class="media"><div class="ph" data-media="${it.id}" data-kind="image" data-big="1">chargement…</div></div>`:`<div class="media"><img class="zoomable" data-full="${esc(it.url)}" src="${esc(it.url)}" alt="" loading="lazy"></div>`;
  if(it.type==="video")return it.hasMedia?`<div class="media"><div class="ph" data-media="${it.id}" data-kind="video" data-big="1">chargement…</div></div>`:`<div class="media"><video controls playsinline src="${esc(it.url)}"></video></div>`;
  if(it.type==="audio")return it.hasMedia?`<div class="media audioblock"><div class="ph" data-media="${it.id}" data-kind="audio">chargement…</div></div>`:`<div class="media audioblock"><audio controls src="${esc(it.url)}"></audio></div>`;
  return "";
}
function contentBlock(it){
  if(it.type==="youtube"||it.type==="link")return `<div class="content islink"><a class="link" href="${esc(it.url)}" target="_blank" rel="noopener">${esc(displayText(it))}</a></div>`;
  if(isMediaType(it.type))return `<div class="filename">${esc(it.hasMedia?it.content:labelFor(it))}</div>`;
  return `<div class="content">${esc(it.content)}</div>`;
}
function rowThumb(it){
  if(it.preview)return `<img class="thumb" src="${esc(it.preview)}" alt="" loading="lazy">`;
  if(it.type==="image")return it.hasMedia?`<div class="thumb-ic" data-media="${it.id}" data-kind="image" data-thumb="1">•</div>`:`<img class="thumb" src="${esc(it.url)}" alt="" loading="lazy">`;
  if(it.type==="youtube"){const yid=ytId(it.url);return yid?`<img class="thumb" src="https://img.youtube.com/vi/${yid}/default.jpg" alt="" loading="lazy">`:"";}
  if(it.type==="video")return `<div class="thumb-ic">${ICON_VIDEO}</div>`;
  if(it.type==="audio")return `<div class="thumb-ic">${ICON_AUDIO}</div>`;
  return "";
}
async function hydrateMedia(root){
  const nodes=Array.from(root.querySelectorAll("[data-media]"));
  for(const n of nodes){
    const id=n.getAttribute("data-media"),kind=n.getAttribute("data-kind");
    const data=await getMedia(id);
    if(!data){n.textContent="média indisponible";continue;}
    if(kind==="image"){const t=n.getAttribute("data-thumb")==="1";n.outerHTML=t?`<img class="thumb" src="${data}" alt="">`:`<img class="zoomable" data-full="${data}" src="${data}" alt="">`;}
    else if(kind==="audio")n.outerHTML=`<audio controls src="${data}"></audio>`;
    else if(kind==="video")n.outerHTML=`<video controls playsinline src="${data}"></video>`;
  }
}

  ensureBatch();
  const stage=document.getElementById("stage");
  const active=items.filter(i=>i.status==="active");
  if(active.length===0){
    stage.innerHTML=`<div class="rest"><div class="big">Ta pile est vide</div>
      <div class="sub">Colle ton premier lien, ta première idée ou ta typo là-haut. Elle te reviendra toute seule.</div></div>`;
    return;
  }
  const id=currentCardId();
  if(!id){
    stage.innerHTML=`<div class="rest"><div class="big">C’est fait pour aujourd’hui</div>
      <div class="sub">Tu as passé en revue ta sélection du jour. Reviens demain, ou fais remonter un truc au hasard maintenant.</div>

  stage.innerHTML=`
    <div class="card">
      <button class="card-edit" data-a="edit" aria-label="Voir / modifier ce grain" title="Voir / modifier"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></button>
      <div class="kicker"><svg class="rise" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>remonté à la surface</div>
      ${mediaBlockBig(it)}
      ${contentBlock(it)}
      ${it.note?`<div class="grain-note">${esc(it.note)}</div>`:""}
      <div class="meta"><span class="badge type">${typeLabel(it)}</span>${domBadge}${seen}<span class="badge time">gardé ${ago(it.createdAt)}</span></div>
      <div class="actions">
        <button class="act-keep" data-a="keep">Garder dans ma pile</button>
        <div class="act-more">
          <button class="act-file" data-a="file">Classer</button>
          <button class="act-archive" data-a="archive">Mettre de côté</button>
          <button class="act-trash" data-a="trash">Jeter</button>
        </div>
      </div>
      <div id="classifyMount"></div>
    </div>
    <div class="batch-bar">

    </div>`;
  const card=stage.querySelector(".card");

  card.querySelector('[data-a="edit"]').onclick=()=>openGrainSheet(id);

function openClassify(id){
  const mount=document.getElementById("classifyMount");
  const doms=domains();
  const chips=doms.map(d=>`<button class="chip" data-d="${esc(d)}">${esc(d)}</button>`).join("")||"";
  mount.innerHTML=`<div class="classify">
    <p>Range-le dans un domaine — ou tape-en un nouveau.</p>
    ${chips?`<div class="chips">${chips}</div>`:""}
    <div class="newdom"><input id="newDom" placeholder="Nouveau domaine (ex. Cuisine, Dev, À lire)" autocomplete="off"><button id="newDomBtn">OK</button></div>
  </div>`;
  mount.querySelectorAll(".chip").forEach(c=>c.onclick=()=>classifyCard(id,c.dataset.d));
  const inp=mount.querySelector("#newDom");
  const go=()=>{const v=inp.value.trim();if(v)classifyCard(id,v);};
  mount.querySelector("#newDomBtn").onclick=go;
  inp.onkeydown=e=>{if(e.key==="Enter")go();};
  inp.focus();
}

function pullExtra(){
  const active=items.filter(i=>i.status==="active"&&!batch.ids.slice(0,batch.idx).includes(i.id));
  const pool=active.filter(i=>i.id!==currentCardId());
  if(pool.length===0){toast("Rien d’autre à faire remonter.");return;}
  const pick=pool[Math.floor(Math.random()*pool.length)];
  batch.ids.splice(batch.idx,0,pick.id);saveBatch();renderStage();
}

/* ---------- Ma pile : accueil (grille de domaines) + collections ---------- */
const TYPE_FILTERS=[["all","Tous"],["note","Notes"],["link","Liens"],["youtube","YouTube"],["media","Photos & médias"]];
const SORTS=[["recent","Ajouts récents d’abord"],["oldest","Plus anciens d’abord"],["forgotten","Les plus oubliés d’abord"]];
function typeMatch(it){if(typeFilter==="all")return true;if(typeFilter==="media")return isMediaType(it.type);return it.type===typeFilter;}
function domCounts(){const c={};for(const i of items){if(i.status==="active"&&i.domain)c[i.domain]=(c[i.domain]||0)+1;}return c;}
function coverFor(list){
  const cand=list.find(i=>i.preview||i.type==="youtube"||i.type==="image")||list[0];
  return cand?galleryThumb(cand):ICON_NOTE;
}
function collectionName(f){return f==="all"?"Toute la pile":f==="none"?"Non classés":f==="archived"?"Mis de côté":f;}
function renderRoot(){
  const grid=document.getElementById("domGrid");
  const counts=domCounts();
  const active=items.filter(i=>i.status==="active");
  const none=active.filter(i=>!i.domain);

  let html=`<button class="dcard" data-f="all"><div class="dcover accent">${coverFor(active)}</div><div class="dbody"><span class="dname">Toute la pile</span><span class="dcount">${active.length}</span></div></button>`;
  if(none.length)html+=`<button class="dcard" data-f="none"><div class="dcover">${coverFor(none)}</div><div class="dbody"><span class="dname">Non classés</span><span class="dcount">${none.length}</span></div></button>`;
  html+=doms.map(d=>{const l=active.filter(i=>i.domain===d);return `<button class="dcard" data-f="${esc(d)}"><div class="dcover">${coverFor(l)}</div><div class="dbody"><span class="dname">${esc(d)}</span><span class="dcount">${counts[d]}</span></div></button>`;}).join("");
  grid.innerHTML=html;
  grid.querySelectorAll(".dcard").forEach(b=>b.onclick=()=>enterCollection(b.dataset.f));
  document.getElementById("archN").textContent=items.filter(i=>i.status==="archived").length;
  hydrateMedia(grid);
}

function renderRootSearch(){

  const res=document.getElementById("rootResults"),browse=document.getElementById("rootBrowse");
  if(!q){res.hidden=true;browse.hidden=false;return;}
  browse.hidden=true;res.hidden=false;
  const rows=items.filter(i=>i.status!=="trashed").filter(i=>(displayText(i)||"").toLowerCase().includes(q)||i.content.toLowerCase().includes(q)||(i.domain||"").toLowerCase().includes(q)||(i.note||"").toLowerCase().includes(q));
  res.innerHTML=rows.length?rows.map(rowHTML).join(""):`<div class="empty-list">Rien ne correspond.</div>`;
  wireRowButtons(res);

function collectionRows(){
  let rows=items.filter(i=>i.status!=="trashed");
  if(pileLoc==="archived")rows=rows.filter(i=>i.status==="archived");
  else{rows=rows.filter(i=>i.status==="active");
    if(pileLoc==="none")rows=rows.filter(i=>!i.domain);
    else if(pileLoc!=="all"&&pileLoc!==null)rows=rows.filter(i=>i.domain===pileLoc);}
  rows=rows.filter(typeMatch);
  if(sortMode==="recent")rows.sort((a,b)=>b.createdAt-a.createdAt);
  else if(sortMode==="oldest")rows.sort((a,b)=>a.createdAt-b.createdAt);
  else if(sortMode==="forgotten")rows.sort((a,b)=>(a.surfaceCount-b.surfaceCount)||((a.lastSurfaced||0)-(b.lastSurfaced||0))||(a.createdAt-b.createdAt));
  return rows;
}

/* ---------- Web Share Target : ingestion des partages entrants ---------- */
const SHARE_CACHE="sable-share-v1";
const SHARE_META="/__sable_share/meta";
const SHARE_FILE="/__sable_share/file_";
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});
}
async function routeFileAsync(f){
  if(!f)return null;
  if(f.type&&f.type.startsWith("image/"))return await addImageFile(f);
  else if(f.type&&f.type.startsWith("audio/"))return await addMediaFile(f,"audio");
  else if(f.type&&f.type.startsWith("video/"))return await addMediaFile(f,"video");
  toast("Type de fichier non pris en charge.");return null;
}
async function ingestText(url,text,title){
  const link=(url||"").trim(),body=(text||"").trim(),ttl=(title||"").trim();
  const v=link||body||ttl;
  if(!v)return null;
  return await addItem(v,{title:ttl||body});
}
async function consumeSharedContent(){
  const params=new URLSearchParams(location.search);
  const isPost=params.has("share-target");
  const created=[];
  // Partage GET (texte/lien) : title/text/url directement en query
  if(!isPost){
    if(params.get("url")||params.get("text")||params.get("title")){
      const id=await ingestText(params.get("url"),params.get("text"),params.get("title"));
      if(id)created.push(id);
      cleanShareUrl();
      await afterShare(created);
    }
    return;
  }
  cleanShareUrl();
  if(!("caches" in window)){toast("Partage non pris en charge ici.");return;}
  try{
    const cache=await caches.open(SHARE_CACHE);
    const metaRes=await cache.match(SHARE_META);
    let meta={files:0};
    if(metaRes){meta=await metaRes.json();await cache.delete(SHARE_META);}
    const nfiles=typeof meta.files==="number"?meta.files:0;
    for(let i=0;i<nfiles;i++){
      const res=await cache.match(SHARE_FILE+i);
      if(!res)continue;
      const blob=await res.blob();
      const name=decodeURIComponent(res.headers.get("x-name")||("partage-"+i));
      const type=res.headers.get("content-type")||blob.type||"application/octet-stream";
      const id=await routeFileAsync(new File([blob],name,{type}));
      if(id)created.push(id);
      await cache.delete(SHARE_FILE+i);
    }
    if(meta.url||meta.text||meta.title){const id=await ingestText(meta.url,meta.text,meta.title);if(id)created.push(id);}
    if(created.length===0)toast("Partage reçu, mais vide.");
    else await afterShare(created);
  }catch(e){toast("Partage impossible à lire.");}
}
/* Après un partage : si UN seul grain est créé, on attend l'aperçu (borné à 4 s)
   puis on ouvre sa fiche pour éditer titre / catégorie / note tout de suite.
   Plusieurs grains d'un coup : on reste discret, pas de fiche imposée. */
async function afterShare(created){
  if(created.length!==1){
    if(created.length>1)toast(created.length+" grains gardés.");
    return;
  }
  const id=created[0];
  const it=items.find(i=>i.id===id);
  if(it&&it.url&&(!it.title||!it.preview)){
    toast("Aperçu en cours…");
    try{await Promise.race([enrich(id),new Promise(r=>setTimeout(r,6000))]);}catch(e){}
  }
  openGrainSheet(id);
}
function displayText(it){return it.title?it.title:labelFor(it);}
const ICON_LINK='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.5.5l3-3a5 5 0 0 0-7-7l-1.5 1.5"/><path d="M14 11a5 5 0 0 0-7.5-.5l-3 3a5 5 0 0 0 7 7L12 19"/></svg>';
const ICON_NOTE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3h11l4 4v14H5z"/><path d="M15 3v5h5"/></svg>';
function galleryThumb(it){
  if(it.preview)return `<img src="${esc(it.preview)}" alt="" loading="lazy">`;
  if(it.type==="image"&&it.hasMedia)return `<div class="ph" data-media="${it.id}" data-kind="image">chargement…</div>`;
  if(it.type==="image"&&it.url)return `<img src="${esc(it.url)}" alt="" loading="lazy">`;
  if(it.type==="youtube"){const y=ytId(it.url);return y?`<img src="https://img.youtube.com/vi/${y}/hqdefault.jpg" alt="" loading="lazy">`:ICON_VIDEO;}
  if(it.type==="video")return ICON_VIDEO;

function parseOG(html,baseUrl){
  try{
    const doc=new DOMParser().parseFromString(html,"text/html");
    const g=(sel,at)=>{const e=doc.querySelector(sel);return e?e.getAttribute(at):null;};
    let t=g('meta[property="og:title"]','content')||g('meta[name="twitter:title"]','content');
    if(!t){const tt=doc.querySelector('title');t=tt?tt.textContent:null;}
    let img=g('meta[property="og:image"]','content')||g('meta[property="og:image:secure_url"]','content')||g('meta[name="twitter:image"]','content')||g('meta[name="twitter:image:src"]','content')||g('link[rel="image_src"]','href');
    if(img){img=img.trim();try{img=new URL(img,baseUrl||undefined).href;}catch(e){}}
    return {title:t?t.trim():null,image:img||null};
  }catch(e){return {title:null,image:null};}
}
function proxImg(u){
  if(!u)return null;
  if(!IMG_PROXY)return u;
  if(u.indexOf("wsrv.nl")>-1||u.indexOf("weserv")>-1)return u; // déjà proxifiée
  return IMG_PROXY+encodeURIComponent(u);
}
async function fetchMeta(url){
  // A) Aperçu maison : notre Edge Function Supabase (côté serveur, comme WhatsApp) — priorité
  if(typeof SELF_META_FN!=="undefined"&&SELF_META_FN){
    try{
      const {data,error}=await _sb.functions.invoke(SELF_META_FN,{body:{url}});
      if(!error&&data&&(data.title||data.image))return {title:((data.title||"").trim())||null,image:proxImg(data.image||null)};
    }catch(e){}
  }
  // 0) Exabase (si clé) : rotation de proxys + rendu JS → franchit l'anti-bot (Reddit, X…)
  if(typeof META_EXABASE_KEY!=="undefined"&&META_EXABASE_KEY){
    try{
      const r=await fetch("https://api.exabase.io/v2/link-preview?q="+encodeURIComponent(url),{headers:{Authorization:"Bearer "+META_EXABASE_KEY}});
      if(r.ok){const j=await r.json();const img=(j&&j.image)||null;const t=((j&&j.title)||"").trim()||null;if(t||img)return {title:t,image:proxImg(img)};}
    }catch(e){}
  }
  // 1) Microlink : navigateur headless, CORS ok → titre + image normalisés
  if(META_API){
    try{
      const r=await fetch(META_API+encodeURIComponent(url));
      if(r.ok){
        const j=await r.json();
        if(j&&j.status==="success"&&j.data){
          const img=(j.data.image&&j.data.image.url)||(j.data.logo&&j.data.logo.url)||null;
          const t=(j.data.title||"").trim()||null;
          if(t||img)return {title:t,image:proxImg(img)};
        }
      }
    }catch(e){}
  }
  // 2) Repli : proxy HTML + Open Graph
  if(LINK_PROXY){
    try{
      const r=await fetch(LINK_PROXY+encodeURIComponent(url));
      if(r.ok){const og=parseOG(await r.text(),url);if(og.title||og.image)return {title:og.title,image:proxImg(og.image)};}
    }catch(e){}
  }
  return null;
}
/* enrich() dédoublonne les appels concurrents (même id) pour ne pas gaspiller le quota */
const enriching=new Map();
function enrich(id){
  if(enriching.has(id))return enriching.get(id);
  const p=_enrich(id).finally(()=>enriching.delete(id));
  enriching.set(id,p);
  return p;
}
async function _enrich(id){
  const it=items.find(x=>x.id===id);
  if(!it||!it.url)return;
  let changed=false;
  try{
    const yid=ytId(it.url);
    if(yid){
      if(!it.preview){it.preview="https://img.youtube.com/vi/"+yid+"/hqdefault.jpg";changed=true;}
      if(!it.title){try{const r=await fetch("https://www.youtube.com/oembed?format=json&url="+encodeURIComponent(it.url));if(r.ok){const j=await r.json();if(j&&j.title){it.title=j.title;changed=true;}}}catch(e){}}
    }else{
      if(it.title&&it.preview)return;
      const meta=await fetchMeta(it.url);
      if(meta){
        if(meta.title&&!it.title){it.title=meta.title;changed=true;}
        if(meta.image&&!it.preview){it.preview=meta.image;changed=true;}
      }
    }
    if(changed){await saveItems();renderAll();}
  }catch(e){}
}
